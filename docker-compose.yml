# Bring up the static site + BFF together.
#
#   docker compose up --build
#
# Then open http://localhost:3000.
#
# Notes
# - NEXT_PUBLIC_BFF_URL is inlined into the static bundle at *build* time
#   (Next.js bakes NEXT_PUBLIC_* vars into the JS). It must be the URL the
#   user's *browser* can reach — not an internal compose hostname like `bff`.
# - For a real deployment, set BFF_PUBLIC_URL to your public BFF origin and
#   set CORS_ORIGIN on the BFF to your site's origin.

services:
  bff:
    build:
      context: ./bff
    image: static-nextjs-bff-demo/bff:latest
    environment:
      PORT: "4000"
      CORS_ORIGIN: "${CORS_ORIGIN:-http://localhost:3000}"
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4000/api/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  web:
    build:
      context: ./web
      args:
        NEXT_PUBLIC_BFF_URL: "${BFF_PUBLIC_URL:-http://localhost:4000}"
    image: static-nextjs-bff-demo/web:latest
    ports:
      - "3000:80"
    depends_on:
      bff:
        condition: service_healthy
    restart: unless-stopped
